#version: '3'
services:   # this is where we define our services (containers)
    # nginx:
    #     image: nginx:stable-alpine
    #     volumes:
    #     - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    #     # depends_on:
    #     #     - node-app  .. problem here is that nginx starts before node-app is ready and node-app not found
    #     ports:
    #     - "8080:80"
    #     restart: always
    node-app:
        container_name: express-node-app-containers
        build: . 
        ports:
            - "3000:3000"
        env_file:
            - ./.env
        depends_on:
            - redis
           # - mongo
           # - postgres 
    # mongo:
    #     image: mongo    
    #     restart: always
    #     volumes:
    #     - mongo-db:/data/db # path of mongo data inside container 
    #     environment:
    #         MONGO_INITDB_ROOT_USERNAME: root
    #         MONGO_INITDB_ROOT_PASSWORD: example
    # # postgres:
    #     image: postgres
    #     restart: always
    #     volumes:
    #     - postgres-db:/var/lib/postgresql/data # path of postgres data inside container
    #     environment:
    #         POSTGRES_USER: root
    #         POSTGRES_PASSWORD: example 
    redis:
        image: redis
        restart: always
        ports:
        - "6379:6379"
    nginx:
        image: nginx:stable-alpine
        ports:
        - "80:80"  # when I use nginx, Idon't need to write  full url with port number because nginx will proxy requests to node-app container which is running on port 3000, so I can just write http://localhost and nginx will forward the request to node-app container.
        volumes:
            - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
            # this file is used to configure nginx to proxy requests to our node-app container. We need to copy this file to the container and then use it as default conf for nginx.
        environment:
        - NGINX_HOST=foobar.com
        - NGINX_PORT=80
        depends_on:
            - node-app

    
    # postgres:
    #     image: postgres
    #     restart: always
    #     volumes:
    #     - postgres-db:/var/lib/postgresql/data # path of postgres data inside container
    #     environment:
    #         POSTGRES_USER: user
    #         POSTGRES_PASSWORD: password
    #         POSTGRES_DB: mydb

volumes: # this is where we define our volumes (persistent storage)
  mongo-db: # this is where we define our volumes (persistent storage) 
  postgres-db: 
